name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export-android:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make sure export template folder exists
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null || true

      - name: Generate a debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=warHands Debug,O=warHands,C=US"

      - name: Show SDK/Java paths baked into this image (for debugging)
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          echo "JAVA_HOME=$JAVA_HOME"
          which java || true
          java -version || true

      - name: Point Godot's Editor Settings at the SDK/Java/keystore
        run: |
          mkdir -p ~/.config/godot
          ANDROID_SDK_PATH="${ANDROID_HOME:-${ANDROID_SDK_ROOT:-/usr/lib/android-sdk}}"
          JAVA_BIN="$(readlink -f "$(which java)")"
          JAVA_SDK_PATH="$(dirname "$(dirname "$JAVA_BIN")")"
          echo "Resolved JAVA_SDK_PATH=$JAVA_SDK_PATH"

          godot --headless --editor --quit-after 1 || true

          SETTINGS_FILE=~/.config/godot/editor_settings-4.tres
          if [ ! -f "$SETTINGS_FILE" ]; then
            echo "[gd_resource type=\"EditorSettings\" format=3]" > "$SETTINGS_FILE"
            echo "" >> "$SETTINGS_FILE"
            echo "[resource]" >> "$SETTINGS_FILE"
          fi

          {
            echo "export/android/android_sdk_path = \"${ANDROID_SDK_PATH}\""
            echo "export/android/java_sdk_path = \"${JAVA_SDK_PATH}\""
            echo "export/android/debug_keystore = \"/root/.android/debug.keystore\""
            echo "export/android/debug_keystore_user = \"androiddebugkey\""
            echo "export/android/debug_keystore_pass = \"android\""
          } >> "$SETTINGS_FILE"

          echo "----- editor_settings-4.tres -----"
          cat "$SETTINGS_FILE"

      - name: Create build output folder
        run: mkdir -v -p build

      - name: Export debug APK
        run: |
          godot --headless --verbose --export-debug "Android" build/warHands.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: warHands-debug-apk
          path: build/*.apk
          if-no-files-found: error
