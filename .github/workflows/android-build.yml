name: Build Android APK

# Runs on every push/PR to main, and can also be triggered manually from
# the "Actions" tab in GitHub with the "Run workflow" button.
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  export-android:
    runs-on: ubuntu-latest
    # This container image ships Godot 4.3 + Android export templates +
    # Android SDK/build-tools already installed, so we don't have to
    # assemble that toolchain by hand on every run.
    container:
      image: barichello/godot-ci:4.3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Make sure export template folder exists
        run: |
          mkdir -v -p ~/.local/share/godot/export_templates
          mv /root/.local/share/godot/export_templates/4.3.stable \
             ~/.local/share/godot/export_templates/4.3.stable 2>/dev/null || true

      - name: Generate a debug keystore for signing
        run: |
          mkdir -p ~/.android
          keytool -genkeypair -v \
            -keystore ~/.android/debug.keystore \
            -storepass android \
            -alias androiddebugkey \
            -keypass android \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=warHands Debug,O=warHands,C=US"

      - name: Create build output folder
        run: mkdir -v -p build

      - name: Export debug APK
        run: |
          godot --headless --verbose --export-debug "Android" build/warHands.apk

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: warHands-debug-apk
          path: build/*.apk
          if-no-files-found: error
